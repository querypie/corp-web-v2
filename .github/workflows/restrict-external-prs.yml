name: Restrict PRs to Org Members

on:
  pull_request_target:
    types: [opened]

jobs:
  check-org-membership:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check if PR author is a querypie org member
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const author = context.payload.pull_request.user.login;
            try {
              await github.rest.orgs.checkMembershipForUser({
                org: 'querypie',
                username: author,
              });
              console.log(`${author} is a querypie org member. PR allowed.`);
            } catch (e) {
              if (e.status === 404 || e.status === 302) {
                console.log(`${author} is NOT a querypie org member. Closing PR.`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: 'This repository only accepts pull requests from [querypie](https://github.com/querypie) organization members.',
                });
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  state: 'closed',
                });
              } else {
                throw e;
              }
            }

name: Deploy on Production

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      BRANCH:
        description: "Branch to Deploy"
        required: true
        default: "main"
        type: "string"

defaults:
  run:
    working-directory: scripts/deploy

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }} # querypie organization secret
      VERCEL_TEAM_ID: team_8DsCdrF1uCfwY30OS8F8lREn
      VERCEL_PROJECT_ID: prj_xeobCehIxv13fSJdlEprUfdqRlTd
      BRANCH: ${{ inputs.BRANCH }}
      TARGET_ENV: 'production'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run Deploy Script
        run: npm run deploy
